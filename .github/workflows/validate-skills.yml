name: Validate skills

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
  pull_request:
    paths:
      - "skills/**"
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml cryptography
      - run: python3 scripts/validate_skills.py
