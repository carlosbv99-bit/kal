<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src {{cspSource}}; script-src 'nonce-{{nonce}}';"
  />
  <link rel="stylesheet" href="{{cssUri}}" />
  <title>Kal</title>
</head>
<body>
  <div id="messages" class="messages"></div>
  <div id="context-indicator" class="context-indicator" style="display:none">
    <span id="context-label"></span>
    <button id="context-dismiss" title="Quitar contexto adjunto">&times;</button>
  </div>
  <div class="input-row">
    <textarea id="input" placeholder="Preguntale algo a kal..." rows="3"></textarea>
    <button id="send">Enviar</button>
  </div>
  <script nonce="{{nonce}}" src="{{jsUri}}"></script>
</body>
</html>
