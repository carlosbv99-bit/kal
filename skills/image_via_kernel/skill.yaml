name: image_via_kernel
description: "Genera una imagen a partir de un prompt de texto, pidiéndoselo al Kernel Service Bus (no carga ningún modelo propio)."
version: "0.1.0"
entry_point: "tool:ImageViaKernelTool"
# Skill de REFERENCIA para el Kernel Service Bus (ver kernel/__init__.py
# y sdk/context.py): demuestra el caso de uso real que
# motivó todo el bus — una skill de terceros produciendo contenido con IA
# sin poder cargar el modelo ella misma (ni declarar torch/diffusers como
# dependencia). requirements vacío a propósito: no necesita NADA más que
# stdlib, todo el trabajo pesado ocurre del lado del kernel.
enabled: true
permissions: []
requirements: []
kernel_services:
  - "image.generate"
parameters_schema:
  type: object
  properties:
    prompt:
      type: string
      description: "Descripción de la imagen a generar"
  required:
    - prompt
